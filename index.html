    const homeScreen = document.getElementById("home-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");

    const startBtn = document.getElementById("start-btn");
    const prevBtn = document.getElementById("prev-btn");
    const backHomeBtn = document.getElementById("back-home-btn");
    const restartBtn = document.getElementById("restart-btn");
    const goHomeBtn = document.getElementById("go-home-btn");

    const progressText = document.getElementById("progress-text");
    const progressFill = document.getElementById("progress-fill");
    const questionText = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options-container");

    const resultTitle = document.getElementById("result-title");
    const resultSubtitle = document.getElementById("result-subtitle");
    const resultDescription = document.getElementById("result-description");
    const resultTags = document.getElementById("result-tags");
    const scoreGrid = document.getElementById("score-grid");

    let currentQuestionIndex = 0;
    let scores = createEmptyScores();
    let answerHistory = [];

    function createEmptyScores() {
      return { Calm: 0, Fire: 0, Rise: 0, Aura: 0, Momentum: 0 };
    }

    function resetQuiz() {
      currentQuestionIndex = 0;
      scores = createEmptyScores();
      answerHistory = [];
    }

    function showScreen(screenToShow) {
      [homeScreen, quizScreen, resultScreen].forEach(screen => screen.classList.remove("active"));
      screenToShow.classList.add("active");
    }

    function applyScore(scoreObject) {
      Object.entries(scoreObject).forEach(([dimension, value]) => {
        scores[dimension] += value;
      });
    }

    function removeScore(scoreObject) {
      Object.entries(scoreObject).forEach(([dimension, value]) => {
        scores[dimension] -= value;
      });
    }

    function renderQuestion() {
      const question = questions[currentQuestionIndex];
      const questionNumber = currentQuestionIndex + 1;
      const progressPercent = (questionNumber / questions.length) * 100;

      progressText.textContent = `第${questionNumber} / ${questions.length}题`;
      progressFill.style.width = `${progressPercent}%`;
      questionText.textContent = question.text;
      optionsContainer.innerHTML = "";
      prevBtn.style.display = currentQuestionIndex === 0 ? "none" : "inline-block";

      question.options.forEach(option => {
        const button = document.createElement("button");
        button.className = "option-btn";
        button.textContent = option.text;

        button.addEventListener("click", () => {
          applyScore(option.score);
          answerHistory[currentQuestionIndex] = option.score;
          currentQuestionIndex += 1;

          if (currentQuestionIndex < questions.length) {
            renderQuestion();
          } else {
            const finalResult = getFinalResult();
            renderResult(finalResult);
            showScreen(resultScreen);
          }
        });

        optionsContainer.appendChild(button);
      });
    }

    function getDistance(profile) {
      return DIMENSIONS.reduce((sum, dimension) => sum + Math.abs(scores[dimension] - profile[dimension]), 0);
    }

    function getFinalResult() {
      const ranked = results
        .map(result => ({ ...result, distance: getDistance(result.profile) }))
        .sort((a, b) => a.distance - b.distance);

      const hiddenJourney = results.find(r => r.id === "journey2026");
      const hiddenAsia = results.find(r => r.id === "asia_representative");

      const journeyTrigger =
        scores.Momentum >= 12 &&
        scores.Rise >= 8 &&
        scores.Aura <= 7;

      const asiaTrigger =
        scores.Aura >= 11 &&
        scores.Calm >= 8 &&
        scores.Fire <= 8;

      if (journeyTrigger) return hiddenJourney;
      if (asiaTrigger) return hiddenAsia;

      return ranked.find(item => !item.hidden) || ranked[0];
    }

    function renderResult(result) {
      resultTitle.textContent = result.title;
      resultSubtitle.textContent = result.subtitle;
      resultDescription.textContent = result.description;

      resultTags.innerHTML = "";
      result.tags.forEach(tagText => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = tagText;
        resultTags.appendChild(tag);
      });

      scoreGrid.innerHTML = "";
      DIMENSIONS.forEach(dimension => {
        const item = document.createElement("div");
        item.className = "score-item";
        item.innerHTML = `
          <div class="score-label">${dimension}</div>
          <div class="score-value">${scores[dimension]}</div>
        `;
        scoreGrid.appendChild(item);
      });
    }

    startBtn.addEventListener("click", () => {
      resetQuiz();
      renderQuestion();
      showScreen(quizScreen);
    });

    prevBtn.addEventListener("click", () => {
      if (currentQuestionIndex === 0) return;

      currentQuestionIndex -= 1;

      const previousScore = answerHistory[currentQuestionIndex];
      if (previousScore) {
        removeScore(previousScore);
        answerHistory[currentQuestionIndex] = null;
      }

      renderQuestion();
    });

    backHomeBtn.addEventListener("click", () => {
      resetQuiz();
      showScreen(homeScreen);
    });

    restartBtn.addEventListener("click", () => {
      resetQuiz();
      renderQuestion();
      showScreen(quizScreen);
    });

    goHomeBtn.addEventListener("click", () => {
      resetQuiz();
      showScreen(homeScreen);
    });
